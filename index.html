<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0BA5A5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ansell GMP" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Ansell GMP Audit</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0BA5A5;
      --primary2: #07C4C4;
      --bg: #F0F9FF;
      --card: #E0F7FA;
      --border: #B2EBF2;
      --tp: #0C4A6E;
      --ts: #0891B2;
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --white: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); overflow: hidden; }
    #app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.15); }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; height: 100%; }
    .screen.active { display: flex; }

    /* ── HOME ── */
    #home { background: linear-gradient(160deg, #0BA5A5 0%, #0369a1 100%); padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
    .home-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 56px 28px 40px; gap: 0; }
    .brand-box { text-align: center; margin-bottom: 16px; }
    .brand-word { font-size: 58px; font-weight: 900; color: #fff; letter-spacing: -3px; line-height: 1; }
    .brand-line { width: 120px; height: 3px; background: rgba(255,255,255,0.45); border-radius: 2px; margin: 8px auto; }
    .brand-tag { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 2.5px; }
    .title-box { text-align: center; margin-bottom: 40px; }
    .rule { width: 48px; height: 2px; background: rgba(255,255,255,0.3); border-radius: 2px; margin: 0 auto 20px; }
    .title-main { font-size: 32px; font-weight: 800; color: #fff; line-height: 1.15; letter-spacing: -0.5px; }
    .title-sub { font-weight: 600; opacity: 0.75; }
    .title-desc { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 10px; line-height: 1.6; }
    .cta-box { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .start-btn { width: 100%; background: #fff; border: none; border-radius: 14px; padding: 18px; font-size: 17px; font-weight: 800; color: #0A9494; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.2); font-family: 'DM Sans', sans-serif; transition: transform 0.1s, opacity 0.1s; }
    .start-btn:active { transform: scale(0.98); opacity: 0.9; }
    .item-count { font-size: 11px; color: rgba(255,255,255,0.45); text-align: center; }

    /* ── TOP BAR ── */
    .top-bar { background: var(--primary); padding: 12px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-top: calc(12px + env(safe-area-inset-top)); }
    .back-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
    .tb-info { flex: 1; }
    .tb-title { font-size: 14px; font-weight: 700; color: #fff; }
    .tb-sub { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 1px; }
    .tb-badge { font-size: 15px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
    .nav-icon-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 16px; position: relative; font-family: 'DM Sans', sans-serif; }
    .nav-badge { position: absolute; top: -4px; right: -4px; background: var(--error); border-radius: 8px; padding: 1px 4px; min-width: 16px; font-size: 9px; font-weight: 700; color: #fff; text-align: center; }

    /* ── SCROLL CONTENT ── */
    .scroll-content { flex: 1; overflow-y: auto; padding: 14px 14px 30px; }
    .scroll-content::-webkit-scrollbar { display: none; }

    /* ── CARDS ── */
    .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 0.5px solid var(--border); }
    .card-title { font-size: 11px; font-weight: 700; color: var(--tp); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }

    /* ── CATEGORY SELECT ── */
    .audit-all-btn { background: var(--primary); border: none; border-radius: 12px; padding: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; cursor: pointer; width: 100%; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s; }
    .audit-all-btn:active { opacity: 0.85; }
    .audit-all-txt { font-size: 14px; font-weight: 700; color: #fff; }
    .cat-item { background: #fff; border-radius: 12px; padding: 14px 14px 14px 18px; border: 0.5px solid #E0F7FA; display: flex; align-items: center; margin-bottom: 8px; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.1s; }
    .cat-item:active { transform: scale(0.99); }
    .cat-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 12px 0 0 12px; }
    .cat-info { flex: 1; margin-left: 8px; }
    .cat-name { font-size: 13px; font-weight: 700; color: var(--tp); }
    .cat-meta { font-size: 11px; color: var(--ts); margin-top: 2px; }
    .mini-bar { height: 3px; background: #E0F7FA; border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .status-badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-left: 8px; white-space: nowrap; }
    .cat-arrow { color: #CBD5E1; font-size: 18px; margin-left: 6px; }

    /* ── AUDIT SCREEN ── */
    .h-card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 0.5px solid var(--border); }
    .prog-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .prog-label { font-size: 11px; color: var(--ts); font-weight: 600; }
    .prog-pct { font-size: 11px; color: var(--primary); font-weight: 700; }
    .p-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .p-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
    .badges-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .c-badge { display: flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 14px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .s-badge { background: rgba(0,0,0,0.07); padding: 2px 8px; border-radius: 10px; font-size: 10px; color: #555; }
    .q-label { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .q-text { font-size: 14px; line-height: 1.6; font-weight: 500; color: var(--tp); }
    .ans-btn { border: 1.5px solid; border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; background: transparent; width: 100%; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
    .ans-btn.selected { }
    .radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .radio-check { color: #fff; font-size: 12px; display: none; }
    .ans-btn.selected .radio-check { display: block; }
    .ans-label { font-size: 13px; font-weight: 600; flex: 1; text-align: left; }
    .na-btn { border: 1.5px solid #CBD5E1; border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; background: transparent; width: 100%; font-family: 'DM Sans', sans-serif; }
    .na-btn.selected { background: #F1F5F9; border-color: #94A3B8; }
    .na-radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #CBD5E1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: #94A3B8; }

    /* ── PHOTO & NOTE ── */
    .photo-section { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px dashed var(--border); }
    .photo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .photo-title { font-size: 10px; font-weight: 700; color: var(--ts); text-transform: uppercase; letter-spacing: 0.5px; }
    .photo-count { font-size: 10px; color: #94A3B8; }
    .photo-btns { display: flex; gap: 8px; margin-bottom: 8px; }
    .photo-btn { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--primary); background: #fff; font-size: 12px; font-weight: 600; color: var(--primary); cursor: pointer; font-family: 'DM Sans', sans-serif; text-align: center; }
    .photo-btn:active { background: var(--card); }
    .photo-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .photo-thumb-wrap { position: relative; width: 68px; height: 68px; }
    .photo-thumb { width: 68px; height: 68px; border-radius: 8px; border: 1px solid var(--border); object-fit: cover; }
    .photo-del { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%; background: var(--error); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; color: #fff; font-size: 10px; font-weight: 700; }
    .note-input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 12px; color: var(--tp); background: var(--bg); min-height: 52px; resize: none; font-family: 'DM Sans', sans-serif; margin-top: 6px; outline: none; }
    .note-count { font-size: 9px; color: #94A3B8; text-align: right; margin-top: 2px; }

    /* ── NAV BUTTONS ── */
    .nav-row { display: flex; gap: 10px; margin-top: 4px; }
    .nv-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s; }
    .nv-btn:disabled { opacity: 0.4; }
    .nv-btn:active { opacity: 0.85; }

    /* ── TAB BAR ── */
    .tab-bar { height: 56px; background: #E0F7FA; border-top: 0.5px solid var(--border); display: flex; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
    .t-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border: none; background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .t-btn .t-icon { font-size: 20px; }
    .t-btn .t-label { font-size: 10px; color: var(--ts); }
    .t-btn.active .t-label { color: var(--primary); font-weight: 700; }

    /* ── NAVIGATOR PANEL ── */
    .nav-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 30; display: flex; flex-direction: column; }
    .np-header { background: var(--primary); padding: 14px; display: flex; align-items: center; gap: 10px; padding-top: calc(14px + env(safe-area-inset-top)); }
    .np-title { font-size: 14px; font-weight: 700; color: #fff; flex: 1; }
    .np-sub { font-size: 10px; color: rgba(255,255,255,0.7); }
    .np-close { background: rgba(255,255,255,0.2); border: none; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; font-family: 'DM Sans', sans-serif; }
    .np-legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; background: var(--card); border-bottom: 0.5px solid var(--border); }
    .np-legend-item { display: flex; align-items: center; gap: 3px; }
    .np-legend-dot { width: 9px; height: 9px; border-radius: 50%; }
    .np-legend-txt { font-size: 9px; color: var(--ts); font-weight: 600; }
    .np-scroll { flex: 1; overflow-y: auto; padding: 8px; }
    .np-cat-hd { display: flex; align-items: center; justify-content: space-between; padding: 6px; border-radius: 8px; margin-bottom: 6px; }
    .np-cat-name { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; flex: 1; }
    .np-cat-cnt { font-size: 9px; font-weight: 700; }
    .np-sub-hd { font-size: 10px; font-weight: 600; color: var(--ts); margin-left: 4px; margin-bottom: 4px; margin-top: 6px; }
    .np-q-grid { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 2px; margin-bottom: 4px; }
    .np-q-btn { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 9px; font-weight: 700; background: #F8FAFC; border-color: #CBD5E1; color: #94A3B8; font-family: 'DM Sans', sans-serif; position: relative; transition: transform 0.1s; }
    .np-q-btn:active { transform: scale(0.95); }
    .np-q-btn.current { box-shadow: 0 0 0 3px var(--primary); }
    .np-q-btn .photo-dot { position: absolute; bottom: 2px; right: 2px; width: 5px; height: 5px; border-radius: 50%; background: var(--primary); }

    /* ── MODAL ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: none; align-items: flex-end; }
    .modal-bg.open { display: flex; }
    .modal-sheet { background: var(--bg); border-radius: 20px 20px 0 0; padding: 18px; max-height: 90%; overflow-y: auto; width: 100%; max-width: 480px; margin: 0 auto; padding-bottom: calc(18px + env(safe-area-inset-bottom)); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--tp); }
    .modal-close { background: var(--card); border: none; border-radius: 8px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ts); font-size: 16px; font-family: 'DM Sans', sans-serif; }
    .score-hero { border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 14px; }
    .score-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .score-num { font-size: 52px; font-weight: 800; }
    .score-status { font-size: 13px; font-weight: 600; margin-top: 4px; }

    /* ── RESULTS ── */
    .q-detail-card { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 7px; border-left: 3px solid; border: 0.5px solid var(--border); }
    .q-detail-sub { font-size: 9px; font-weight: 600; color: var(--ts); margin-bottom: 3px; }
    .q-detail-text { font-size: 12px; color: var(--tp); line-height: 1.5; margin-bottom: 6px; }
    .ans-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
    .summary-row { display: flex; justify-content: space-between; padding: 4px 0; }
    .cat-breakdown { display: flex; flex-direction: column; gap: 8px; }
    .cat-bd-item { background: var(--card); border-radius: 10px; padding: 10px 12px; border: 0.5px solid var(--border); }
    .cat-bd-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .cat-bd-name { font-size: 13px; font-weight: 700; color: var(--tp); }
    .cat-bd-scores { display: flex; flex-wrap: wrap; gap: 10px; }

    /* ── SETTINGS TAB ── */
    .settings-logo { background: var(--primary); border-radius: 14px; padding: 18px; text-align: center; margin-bottom: 12px; }
    .settings-logo-name { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -1px; }
    .settings-logo-line { width: 70px; height: 2px; background: rgba(255,255,255,0.5); border-radius: 2px; margin: 6px auto 8px; }
    .settings-logo-sub { font-size: 13px; font-weight: 700; color: #fff; }
    .prog-stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid #F0F9FF; }
    .prog-stat-label { font-size: 12px; color: var(--ts); }
    .prog-stat-val { font-size: 13px; font-weight: 700; }

    /* ── CAT RESULT ── */
    .cat-score-hero { border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 14px; }

    /* ── UTILS ── */
    .hidden { display: none !important; }
    .flex-row { display: flex; align-items: center; }
    .gap-6 { gap: 6px; }
    .mt-6 { margin-top: 6px; }

    /* Animations */
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .screen.active { animation: slideUp 0.2s ease-out; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════ HOME ══════════════════════════════ -->
  <div id="home" class="screen active">
    <div class="home-scroll">
      <div class="brand-box">
        <div class="brand-word">Ansell</div>
        <div class="brand-line"></div>
        <div class="brand-tag">PROTECTION SOLUTIONS</div>
      </div>
      <div class="title-box">
        <div class="rule"></div>
        <div class="title-main">GMP Audit<br><span class="title-sub">Checklist</span></div>
        <div class="title-desc">Good Manufacturing Practice<br>Compliance Evaluation Tool</div>
      </div>
      <div class="cta-box">
        <button class="start-btn" onclick="goTo('catselect')">▶  Begin Audit</button>
        <div class="item-count" id="home-count"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════ CATEGORY SELECT ══════════════════════════ -->
  <div id="catselect" class="screen" style="background:var(--bg);">
    <div class="top-bar">
      <button class="back-btn" onclick="goTo('home')">←</button>
      <div class="tb-info">
        <div class="tb-title">Select Category</div>
        <div class="tb-sub" id="cs-answered-lbl">0 of 0 answered total</div>
      </div>
      <div class="tb-badge">Ansell</div>
    </div>
    <div class="scroll-content" id="catselect-content"></div>
  </div>

  <!-- ══════════════════════════ AUDIT SCREEN ══════════════════════════ -->
  <div id="audit" class="screen" style="background:var(--bg);">
    <div class="top-bar">
      <button class="back-btn" onclick="goTo('catselect')">←</button>
      <div class="tb-info">
        <div class="tb-title" id="audit-title"></div>
        <div class="tb-sub" id="audit-sub"></div>
      </div>
      <div class="tb-badge">Ansell</div>
      <button class="nav-icon-btn" id="nav-open-btn" onclick="openNavPanel()">
        ☰
        <span class="nav-badge hidden" id="nav-badge"></span>
      </button>
    </div>

    <!-- Tab content -->
    <div id="audit-tab-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="t-btn active" id="tab-audit" onclick="switchTab('audit')">
        <span class="t-icon">📋</span>
        <span class="t-label">Audit</span>
      </button>
      <button class="t-btn" id="tab-settings" onclick="switchTab('settings')">
        <span class="t-icon">⚙️</span>
        <span class="t-label">Settings</span>
      </button>
    </div>

    <!-- Navigator Panel -->
    <div class="nav-panel hidden" id="nav-panel">
      <div class="np-header">
        <div>
          <div class="np-title">Question Navigator</div>
          <div class="np-sub" id="nav-panel-sub"></div>
        </div>
        <button class="np-close" onclick="closeNavPanel()">✕</button>
      </div>
      <div class="np-legend">
        <div class="np-legend-item"><div class="np-legend-dot" style="background:#10B981"></div><span class="np-legend-txt">Comply</span></div>
        <div class="np-legend-item"><div class="np-legend-dot" style="background:#F59E0B"></div><span class="np-legend-txt">Partial</span></div>
        <div class="np-legend-item"><div class="np-legend-dot" style="background:#EF4444"></div><span class="np-legend-txt">Not Comply</span></div>
        <div class="np-legend-item"><div class="np-legend-dot" style="background:#94A3B8"></div><span class="np-legend-txt">N/A</span></div>
        <div class="np-legend-item"><div class="np-legend-dot" style="background:#F1F5F9;border:1px solid #CBD5E1"></div><span class="np-legend-txt">Skipped</span></div>
      </div>
      <div class="np-scroll" id="nav-panel-content"></div>
    </div>
  </div>

  <!-- ══════════════════════════ CAT RESULT ══════════════════════════ -->
  <div id="catresult" class="screen" style="background:var(--bg);">
    <div class="top-bar">
      <button class="back-btn" id="catresult-back">←</button>
      <div class="tb-info">
        <div class="tb-title" id="catresult-title"></div>
        <div class="tb-sub">Category Results</div>
      </div>
      <div class="tb-badge">Ansell</div>
    </div>
    <div class="scroll-content" id="catresult-content"></div>
  </div>

  <!-- ══════════════════════════ RESULTS MODAL ══════════════════════════ -->
  <div class="modal-bg" id="results-modal">
    <div class="modal-sheet" id="results-modal-content"></div>
  </div>

</div>

<!-- Hidden file input for photos -->
<input type="file" id="photo-input" accept="image/*" multiple style="display:none" />
<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" />

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const CATS = [
  {name:'Personnel',               color:'#38BDF8'},

function renderCatSelect() {
  const totalAns = Object.keys(state.responses).length;
  document.getElementById('cs-answered-lbl').textContent = `${totalAns} of ${QS.length} answered total`;
  const c = document.getElementById('catselect-content');
  let html = `
    <div class="card" style="margin-bottom:12px;">
      <p style="font-size:12px;color:var(--ts);line-height:1.7;">

  `;
  CATS.forEach(cat => {
    const catQs = QSI.filter(q => q.cat === cat.name);

    const badgeTxt = allDone ? '✓ Done' : answered > 0 ? pct + '%' : 'Not started';
    const arrow = allDone ? '📊' : '›';
    const onclick = allDone ? `viewCatResult('${cat.name}')` : `startAuditCat('${cat.name}')`;
    html += `
      <div class="cat-item" style="${allDone ? 'border:1.5px solid ' + cat.color + '44;' : ''}" onclick="${onclick}">

        <div class="cat-info">
          <div class="cat-name">${cat.name}</div>

  document.getElementById('tab-settings').classList.toggle('active', tab === 'settings');
  renderAuditTab();
}

function renderAuditTab() {
  const qs = state.auditQs;
  const idx = state.auditIdx;
  const answered = qs.filter(q => state.responses[q.i] !== undefined).length;
  const skipped = qs.length - answered;

  document.getElementById('audit-title').textContent = state.auditTitle;
  document.getElementById('audit-sub').textContent = `${answered} of ${qs.length} answered`;

  const badge = document.getElementById('nav-badge');
  if (skipped > 0) { badge.textContent = skipped; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');

  if (state.auditTab === 'audit') renderAuditQuestion();
  else renderSettingsTab();
}

function renderAuditQuestion() {
  const qs = state.auditQs;
  const idx = state.auditIdx;
  const q = qs[idx];
  const total = qs.length;
  const pct = Math.round(((idx + 1) / total) * 100);
  const cc = CC[q.cat] || '#0BA5A5';
  const isLast = idx === total - 1;
  const qPhotos = state.photos[q.i] || [];
  const qNote = state.notes[q.i] || '';

  let ansHtml = '';
  ANSWERS.forEach(a => {
    const sel = curAns === a.value;
    ansHtml += `
      <button class="ans-btn ${sel ? 'selected' : ''}" style="border-color:${a.color};${sel ? 'background:' + a.color + ';' : ''}"

        </div>
        <span class="ans-label" style="color:${sel ? '#fff' : a.color};">${a.label}</span>
      </button>
    `;
  });
  const naSel = curAns === 'na';
  ansHtml += `
    <button class="na-btn ${naSel ? 'selected' : ''}" onclick="pickAnswer('na')">
      <div class="na-radio">−</div>
      <span class="ans-label" style="color:${naSel ? '#64748B' : '#94A3B8'};">N/A — Not Applicable</span>

    thumbsHtml += `

        <button class="photo-del" onclick="removePhoto(${pi})">✕</button>

  const content = `
    <div class="scroll-content" style="flex:1;overflow-y:auto;">
      <div class="h-card">
        <div class="prog-row">
          <span class="prog-label">Q ${idx + 1} of ${total}</span>

        <div class="p-bar"><div class="p-fill" style="width:${pct}%;"></div></div>
        <div class="badges-row">
          <div class="c-badge" style="background:${cc}22;">
            <div class="dot" style="background:${cc};"></div>
            <span style="font-size:10px;font-weight:700;color:${cc};">${q.cat}</span>
          </div>
          ${q.sub ? `<div class="s-badge">${q.sub}</div>` : ''}
        </div>
      </div>
      <div class="card" style="margin-bottom:10px;">
        <div class="q-label">${q.cat}${q.sub ? ' › ' + q.sub : ''}</div>
        <div class="q-text">${q.text}</div>
      </div>
      ${ansHtml}
      <div class="photo-section">
        <div class="photo-header">
          <span class="photo-title">📷 Evidence <span style="font-size:9px;color:#94A3B8;font-weight:400;">Optional</span></span>
          <span class="photo-count">${qPhotos.length}/5</span>
        </div>
        <div class="photo-btns">
          <button class="photo-btn" onclick="pickPhoto(true)">📷 Camera</button>
          <button class="photo-btn" onclick="pickPhoto(false)">🖼️ Gallery</button>
        </div>
        ${thumbsHtml ? `<div class="photo-thumbs" id="photo-thumbs">${thumbsHtml}</div>` : '<div id="photo-thumbs"></div>'}
        <textarea class="note-input" id="note-input" maxlength="200" placeholder="Add a note or observation (optional)...">${qNote}</textarea>
        <div class="note-count" id="note-count">${qNote.length}/200</div>
      </div>
      <div class="nav-row">
        <button class="nv-btn" style="background:var(--primary);" onclick="prevQ()" ${idx === 0 ? 'disabled' : ''}>◀ Prev</button>
        ${isLast
          ? `<button class="nv-btn" style="background:var(--success);" onclick="submitAudit()">Submit ✓</button>`
          : `<button class="nv-btn" style="background:var(--primary2);" onclick="nextQ()">Next ▶</button>`
        }
      </div>
    </div>
  `;
  document.getElementById('audit-tab-content').innerHTML = content;

  document.getElementById('note-input').addEventListener('input', function () {
    state.notes[q.i] = this.value.slice(0, 200);
    document.getElementById('note-count').textContent = this.value.length + '/200';
  });

function renderSettingsTab() {
  const qs = state.auditQs;
  const answered = qs.filter(q => state.responses[q.i] !== undefined).length;
  const skipped = qs.length - answered;
  const withPhotos = qs.filter(q => (state.photos[q.i] || []).length > 0).length;
  const content = `
    <div class="scroll-content" style="flex:1;overflow-y:auto;">

      </div>
      <div class="card" style="margin-bottom:10px;">
        <div class="card-title">Session Progress</div>
        ${[['Total Questions', qs.length, 'var(--tp)'],['Answered', answered, 'var(--tp)'],
           ['Skipped', skipped, skipped > 0 ? 'var(--error)' : 'var(--tp)'],
           ['With Photos 📷', withPhotos, 'var(--primary)']].map(([l,v,c]) => `
          <div class="prog-stat-row">

      <button class="nv-btn" style="background:#0C4A6E;border-radius:12px;padding:13px;margin-bottom:8px;width:100%;display:block;" onclick="exportPDF()">📄 Export PDF Report</button>
      <button class="nv-btn" style="background:var(--error);border-radius:12px;padding:13px;margin-bottom:8px;width:100%;display:block;" onclick="confirmNewAudit()">↺ Start New Audit</button>
      <button class="nv-btn" style="background:var(--primary);border-radius:12px;padding:13px;width:100%;display:block;" onclick="goTo('catselect')">← Back to Categories</button>

}

function pickAnswer(val) {
  const q = state.auditQs[state.auditIdx];
  state.responses[q.i] = val;
  renderAuditQuestion();
}

function prevQ() {
  if (state.auditIdx > 0) { state.auditIdx--; renderAuditQuestion(); }
}
function nextQ() {
  if (state.auditIdx < state.auditQs.length - 1) { state.auditIdx++; renderAuditQuestion(); }
}

function submitAudit() {
  const left = state.auditQs.filter(q => state.responses[q.i] === undefined).length;
  if (left > 0) {
    openNavPanel();
    alert(`${left} question${left > 1 ? 's' : ''} unanswered. Use the navigator to find them.`);
    return;
  }
  openResultsModal();
}

function confirmNewAudit() {
  if (confirm('Clear all responses and start new audit?')) {
    state.responses = {};
    state.photos = {};
    state.notes = {};
    state.auditIdx = 0;
    goTo('catselect');
  }
}

let _photoCallback = null;
document.getElementById('photo-input').addEventListener('change', function () {
  handleFiles(this.files);
  this.value = '';
});
document.getElementById('camera-input').addEventListener('change', function () {
  handleFiles(this.files);
  this.value = '';
});

function handleFiles(files) {
  const q = state.auditQs[state.auditIdx];
  const current = state.photos[q.i] || [];
  const remaining = 5 - current.length;
  if (remaining <= 0) { alert('Max 5 photos per question.'); return; }
  const toAdd = Array.from(files).slice(0, remaining);
  let loaded = 0;
  toAdd.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      if (!state.photos[q.i]) state.photos[q.i] = [];
      state.photos[q.i].push(e.target.result);
      loaded++;
      if (loaded === toAdd.length) renderAuditQuestion();
    };
    reader.readAsDataURL(file);
  });
}

function pickPhoto(useCamera) {
  const q = state.auditQs[state.auditIdx];
  const current = state.photos[q.i] || [];
  if (current.length >= 5) { alert('Max 5 photos per question.'); return; }
  if (useCamera) document.getElementById('camera-input').click();
  else document.getElementById('photo-input').click();
}

function removePhoto(pi) {
  const q = state.auditQs[state.auditIdx];
  if (state.photos[q.i]) {
    state.photos[q.i].splice(pi, 1);
    renderAuditQuestion();
  }
}

// ─────────────────────────────────────────────
function openNavPanel() {
  const qs = state.auditQs;
  const skipped = qs.length - qs.filter(q => state.responses[q.i] !== undefined).length;
  document.getElementById('nav-panel-sub').textContent = `${skipped} unanswered · tap to jump`;
  const cats = [...new Set(qs.map(q => q.cat))];
  let html = '';
  cats.forEach(cat => {
    const catQs = qs.map((q, li) => ({ ...q, li })).filter(q => q.cat === cat);
    const color = CC[cat] || '#0BA5A5';
    const catAns = catQs.filter(q => state.responses[q.i] !== undefined).length;
    const subs = [...new Set(catQs.map(q => q.sub))];
    html += `
      <div style="margin-bottom:10px;">
        <div class="np-cat-hd" style="background:${color}18;">
          <span class="np-cat-name" style="color:${color};">${cat}</span>
          <span class="np-cat-cnt" style="color:${catAns < catQs.length ? 'var(--error)' : color};">${catAns}/${catQs.length}</span>
        </div>
    `;
    subs.forEach(sub => {
      const subQs = catQs.filter(q => q.sub === sub);
      if (sub) html += `<div class="np-sub-hd">› ${sub}</div>`;
      html += `<div class="np-q-grid">`;
      subQs.forEach(q => {
        const ans = state.responses[q.i];
        const hp = (state.photos[q.i] || []).length > 0;
        const isCur = q.li === state.auditIdx;
        const bg = ans ? ANS_COLORS[ans] : '#F8FAFC';
        const bc = ans ? ANS_COLORS[ans] : '#CBD5E1';
        const fc = ans ? '#fff' : '#94A3B8';
        html += `
          <button class="np-q-btn ${isCur ? 'current' : ''}"
            style="background:${bg};border-color:${bc};color:${fc};"
            onclick="jumpTo(${q.li})">
            ${q.li + 1}
            ${hp ? `<span class="photo-dot" style="background:${ans ? 'rgba(255,255,255,0.9)' : 'var(--primary)'}"></span>` : ''}
          </button>
        `;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });
  document.getElementById('nav-panel-content').innerHTML = html;
  document.getElementById('nav-panel').classList.remove('hidden');
}

function closeNavPanel() {
  document.getElementById('nav-panel').classList.add('hidden');
}

function jumpTo(li) {
  state.auditIdx = li;
  state.auditTab = 'audit';
  document.getElementById('tab-audit').classList.add('active');
  document.getElementById('tab-settings').classList.remove('active');
  closeNavPanel();
  renderAuditQuestion();
}

function openResultsModal() {
  const qs = state.auditQs;
  const comply = qs.filter(q => state.responses[q.i] === 'comply').length;
  const partial = qs.filter(q => state.responses[q.i] === 'partially_comply').length;
  const notComply = qs.filter(q => state.responses[q.i] === 'not_comply').length;
  const na = qs.filter(q => state.responses[q.i] === 'na').length;
  const scored = comply + partial + notComply;
  const score = scored > 0 ? Math.round(((comply + partial * 0.5) / scored) * 100) : 0;
  const sc = score >= 75 ? '#10B981' : score >= 50 ? '#F59E0B' : '#EF4444';
  const st = score >= 75 ? 'Good Standing' : score >= 50 ? 'Needs Improvement' : 'Action Required';

  const catMap = {};
  qs.forEach(q => {
    if (!catMap[q.cat]) catMap[q.cat] = { comply: 0, partially_comply: 0, not_comply: 0, na: 0 };
    if (state.responses[q.i]) catMap[q.cat][state.responses[q.i]]++;
  });

  let catHtml = '';
  Object.entries(catMap).forEach(([name, d]) => {
    catHtml += `
      <div class="cat-bd-item">
        <div class="cat-bd-name-row">
          <div class="dot" style="background:${CC[name] || 'var(--primary)'};"></div>
          <span class="cat-bd-name">${name}</span>
        </div>
        <div class="cat-bd-scores">
          <span style="font-size:12px;color:#10B981;">✓ ${d.comply}</span>
          <span style="font-size:12px;color:#F59E0B;">~ ${d.partially_comply}</span>
          <span style="font-size:12px;color:#EF4444;">✗ ${d.not_comply}</span>
          ${d.na > 0 ? `<span style="font-size:12px;color:#94A3B8;">N/A ${d.na}</span>` : ''}
        </div>
      </div>
    `;
  });

  document.getElementById('results-modal-content').innerHTML = `
    <div class="modal-header">
      <span class="modal-title">Audit Results</span>
      <button class="modal-close" onclick="closeResultsModal()">✕</button>
    </div>
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--ts);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">Compliance Score</div>
      <div style="font-size:48px;font-weight:800;color:${sc};">${score}%</div>
      <div style="font-size:13px;font-weight:600;color:${sc};">${st}</div>
    </div>
    <button class="nv-btn" style="background:#0C4A6E;border-radius:12px;padding:13px;margin-bottom:14px;width:100%;display:block;" onclick="closeResultsModal();exportPDF();">📄 Export PDF Report</button>
    <div class="card" style="background:#CFFAFE;border:1px solid var(--primary);margin-bottom:14px;">
      <div class="card-title" style="margin-bottom:8px;">Overall Summary</div>
      ${[['Total', qs.length, 'var(--tp)'],['Comply', comply, '#10B981'],['Partially Comply', partial, '#F59E0B'],['Not Comply', notComply, '#EF4444'],...(na?[['N/A', na, '#94A3B8']]:[])]
        .map(([l,v,c]) => `<div class="summary-row"><span style="font-size:12px;font-weight:600;color:${c};">${l}:</span><span style="font-size:14px;font-weight:700;color:${c};">${v}</span></div>`).join('')}
    </div>
    <div class="card-title" style="margin-bottom:8px;">Category Breakdown</div>
    <div class="cat-breakdown">${catHtml}</div>
  `;
  document.getElementById('results-modal').classList.add('open');
}

function closeResultsModal() {
  document.getElementById('results-modal').classList.remove('open');
}

// ─────────────────────────────────────────────
// CATEGORY RESULT
// ─────────────────────────────────────────────
function renderCatResult() {
  const catName = state.resultCat;
  const color = CC[catName] || '#0BA5A5';
  const catQs = QSI.filter(q => q.cat === catName);
  const comply = catQs.filter(q => state.responses[q.i] === 'comply').length;
  const partial = catQs.filter(q => state.responses[q.i] === 'partially_comply').length;
  const notComply = catQs.filter(q => state.responses[q.i] === 'not_comply').length;
  const na = catQs.filter(q => state.responses[q.i] === 'na').length;
  const scored = comply + partial + notComply;
  const score = scored > 0 ? Math.round(((comply + partial * 0.5) / scored) * 100) : 0;
  const st = score >= 75 ? 'Good Standing' : score >= 50 ? 'Needs Improvement' : 'Action Required';

  document.getElementById('catresult-title').textContent = catName;
  document.getElementById('catresult-back').onclick = () => goTo('catselect');

  let detailHtml = '';
  catQs.forEach((q, li) => {
    const ans = state.responses[q.i];
    const ac = ans ? ANS_COLORS[ans] : '#CBD5E1';
    const qp = state.photos[q.i] || [];
    const qn = state.notes[q.i] || '';
    let thumbs = qp.map(src => `<img src="${src}" style="width:52px;height:52px;border-radius:6px;border:1px solid var(--border);object-fit:cover;">`).join('');
    detailHtml += `
      <div class="q-detail-card" style="border-left-color:${ac};border-left-width:3px;">
        ${q.sub ? `<div class="q-detail-sub">› ${q.sub}</div>` : ''}
        <div class="q-detail-text">${q.text}</div>
        <div class="ans-pill" style="background:${ac}22;color:${ac};">${ans ? ANS_LABELS[ans] : 'Unanswered'}</div>
        ${thumbs ? `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;">${thumbs}</div>` : ''}
        ${qn ? `<div style="font-size:10px;color:#64748B;margin-top:5px;font-style:italic;background:#F8FAFC;padding:5px;border-radius:6px;">📝 ${qn}</div>` : ''}
      </div>
    `;
  });

  document.getElementById('catresult-content').innerHTML = `
    <div class="cat-score-hero" style="background:${color};">
      <div style="font-size:10px;color:rgba(255,255,255,0.8);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">Compliance Score</div>
      <div style="font-size:52px;font-weight:800;color:#fff;line-height:1;">${score}%</div>
      <div style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);margin-top:4px;">${st}</div>
    </div>
    <button class="nv-btn" style="background:#0C4A6E;border-radius:12px;padding:13px;margin-bottom:12px;width:100%;display:block;" onclick="exportCatPDF('${catName}')">📄 Export PDF Report</button>
    <div class="card" style="background:#CFFAFE;border:1px solid var(--primary);margin-bottom:12px;">
      <div class="card-title" style="margin-bottom:8px;">Summary — ${catName}</div>
      ${[['Total Questions', catQs.length, 'var(--tp)'],['Comply', comply, '#10B981'],['Partially Comply', partial, '#F59E0B'],['Not Comply', notComply, '#EF4444'],...(na?[['N/A', na, '#94A3B8']]:[])]
        .map(([l,v,c]) => `<div class="summary-row"><span style="font-size:12px;font-weight:600;color:${c};">${l}</span><span style="font-size:13px;font-weight:700;color:${c};">${v}</span></div>`).join('')}
    </div>
    <div class="card-title" style="margin-bottom:8px;">Question Details</div>
    ${detailHtml}
    <button class="nv-btn" style="background:${color};border-radius:12px;padding:14px;margin-top:8px;width:100%;display:block;" onclick="startAuditCat('${catName}');goTo('audit');">Re-audit ${catName}</button>
  `;
}

// ─────────────────────────────────────────────
// PDF EXPORT
// ─────────────────────────────────────────────
function generatePDFHTML(qs, title, responses, photos, notes) {
  const now = new Date();
  const comply = qs.filter(q => responses[q.i] === 'comply').length;
  const partial = qs.filter(q => responses[q.i] === 'partially_comply').length;
  const notComply = qs.filter(q => responses[q.i] === 'not_comply').length;
  const na = qs.filter(q => responses[q.i] === 'na').length;
  const scored = comply + partial + notComply;
  const score = scored > 0 ? Math.round(((comply + partial * 0.5) / scored) * 100) : 0;
  const sc = score >= 75 ? '#10B981' : score >= 50 ? '#F59E0B' : '#EF4444';
  const st = score >= 75 ? 'Good Standing' : score >= 50 ? 'Needs Improvement' : 'Action Required';

  const catMap = {};
  qs.forEach(q => {
    if (!catMap[q.cat]) catMap[q.cat] = { comply: 0, partially_comply: 0, not_comply: 0, na: 0, qs: [] };
    if (responses[q.i]) catMap[q.cat][responses[q.i]]++;
    catMap[q.cat].qs.push(q);
  });

  let html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Ansell GMP Audit</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;padding:20px;color:#1a1a1a;font-size:12px;}
    .header{background:linear-gradient(135deg,#0BA5A5,#07C4C4);padding:24px;border-radius:10px;color:#fff;margin-bottom:20px;text-align:center;}
    .brand{font-size:36px;font-weight:900;letter-spacing:-2px;}
    .score-box{text-align:center;padding:16px;margin-bottom:20px;border:2px solid ${sc};border-radius:10px;}
    .score-num{font-size:52px;font-weight:900;color:${sc};}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
    .scard{background:#f5f5f5;border-radius:8px;padding:10px;text-align:center;}
    .snum{font-size:22px;font-weight:800;}
    .cat-section{margin-bottom:14px;border:1px solid #ddd;border-radius:8px;overflow:hidden;}
    .cat-hd{padding:10px 14px;font-weight:700;font-size:13px;color:#fff;display:flex;justify-content:space-between;}
    .q-row{padding:8px 14px;border-bottom:1px solid #f0f0f0;display:flex;gap:8px;align-items:flex-start;}
    .q-row:last-child{border-bottom:none;}
    .q-n{font-size:10px;color:#999;min-width:22px;margin-top:1px;}
    .q-body{flex:1;}
    .q-sub{font-size:9px;color:#0BA5A5;font-weight:600;margin-bottom:2px;}
    .q-t{font-size:11px;line-height:1.5;color:#333;}
    .q-a{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;align-self:flex-start;flex-shrink:0;margin-top:1px;}
    .q-note{font-size:10px;color:#666;font-style:italic;margin-top:4px;background:#f9f9f9;padding:4px 6px;border-radius:4px;}
    .footer{text-align:center;color:#aaa;font-size:10px;margin-top:20px;padding-top:12px;border-top:1px solid #eee;}
  </style></head><body>
  <div class="header">
    <div class="brand">Ansell</div>
    <div style="font-size:15px;font-weight:600;opacity:0.9;margin-top:4px;">GMP Audit Report — ${title}</div>
    <div style="font-size:11px;opacity:0.7;margin-top:3px;">Generated: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}</div>
  </div>
  <div class="score-box">
    <div style="font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Overall Compliance Score</div>
    <div class="score-num">${score}%</div>
    <div style="font-size:14px;font-weight:600;color:${sc};">${st}</div>
  </div>
  <div class="grid4">
    <div class="scard"><div class="snum" style="color:#0BA5A5;">${qs.length}</div><div style="font-size:10px;color:#666;">Total</div></div>
    <div class="scard"><div class="snum" style="color:#10B981;">${comply}</div><div style="font-size:10px;color:#666;">Comply</div></div>
    <div class="scard"><div class="snum" style="color:#F59E0B;">${partial}</div><div style="font-size:10px;color:#666;">Partial</div></div>
    <div class="scard"><div class="snum" style="color:#EF4444;">${notComply}</div><div style="font-size:10px;color:#666;">Not Comply</div></div>
  </div>`;

  Object.entries(catMap).forEach(([cat, d]) => {
    const color = CC[cat] || '#0BA5A5';
    const cs = d.comply + d.partially_comply + d.not_comply;
    const cscore = cs > 0 ? Math.round(((d.comply + d.partially_comply * 0.5) / cs) * 100) : 0;
    html += `<div class="cat-section">
      <div class="cat-hd" style="background:${color};">
        ${cat}
        <span style="font-size:11px;background:rgba(255,255,255,0.2);padding:1px 8px;border-radius:8px;">${cscore}% — ✓${d.comply} ~${d.partially_comply} ✗${d.not_comply}${d.na?' N/A:'+d.na:''}</span>
      </div>`;
    d.qs.forEach((q, li) => {
      const ans = responses[q.i];
      const ac = ans ? ANS_COLORS[ans] : '#CBD5E1';
      const al = ans ? ANS_LABELS[ans] : 'Unanswered';
      const note = notes[q.i] || '';
      const hp = (photos[q.i] || []).length;
      html += `<div class="q-row">
        <div class="q-n">${li + 1}</div>
        <div class="q-body">
          ${q.sub ? `<div class="q-sub">› ${q.sub}</div>` : ''}
          <div class="q-t">${q.text}${hp > 0 ? ` <span style="color:#0BA5A5;font-size:9px;">📷 ${hp} photo${hp > 1 ? 's' : ''}</span>` : ''}</div>
          ${note ? `<div class="q-note">📝 ${note}</div>` : ''}
        </div>
        <div class="q-a" style="background:${ac}22;color:${ac};">${al}</div>
      </div>`;
    });
    html += `</div>`;
  });

  html += `<div class="footer">Ansell Lanka (Pvt) Ltd · GMP Audit Checklist · Biyagama Export Processing Zone</div></body></html>`;
  return html;
}

function exportPDF() {
  const html = generatePDFHTML(state.auditQs, state.auditTitle, state.responses, state.photos, state.notes);
  printHTML(html);
}

function exportCatPDF(catName) {
  const catQs = QSI.filter(q => q.cat === catName);
  const html = generatePDFHTML(catQs, catName, state.responses, state.photos, state.notes);
  printHTML(html);
}

function printHTML(html) {
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => { win.print(); }, 500);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
